<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متاهة السطور | الحماية الاحترافية المتقدمة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --paper: #fdfaf0;
            --corporate-blue: #1a2a6c;
            --corporate-gradient: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            --accent: #d4af37;
            --text-dark: #1e272e;
            --error: #e74c3c;
            --success: #27ae60;
            --pending: #f39c12;
            --shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; margin: 0; padding: 0; color: var(--text-dark); overflow-x: hidden; }

        /* شاشة الحظر النهائية */
        #ban-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 9999; flex-direction: column; align-items: center; 
            justify-content: center; text-align: center; color: red; 
        }
        .ban-box { padding: 30px; border: 5px solid red; border-radius: 20px; background: #fff5f5; max-width: 80%; }

        header { background: #fff; padding: 30px 20px; text-align: center; border-bottom: 5px solid var(--corporate-blue); box-shadow: var(--shadow); }
        header h1 { font-size: 3rem; font-family: 'Reem Kufi', sans-serif; margin: 0; background: var(--corporate-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        #userBar { background: #1e272e; color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        
        .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 30px; max-width: 1200px; margin: 40px auto; padding: 20px; }

        .book-card {
            width: 150px; height: 220px; background: var(--corporate-blue); border-radius: 3px 15px 15px 3px; position: relative;
            box-shadow: 10px 10px 25px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; color: white;
            cursor: pointer; transition: 0.3s;
        }
        .book-card:hover { transform: scale(1.05); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; }
        .form-container { background: white; max-width: 500px; margin: 50px auto; padding: 35px; border-radius: 15px; border-top: 10px solid var(--corporate-blue); }
        
        input, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 2px solid #eee; border-radius: 8px; font-family: 'Cairo'; box-sizing: border-box; }
        .btn-action { background: var(--corporate-gradient); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .publish-fixed { position: fixed; bottom: 30px; left: 30px; background: var(--corporate-gradient); color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: var(--shadow); z-index: 100; }
        #logoutBtn { background: var(--error); color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="ban-screen">
        <div class="ban-box">
            <h1>⚠️ تم حظر حسابك نهائياً</h1>
            <p>تم رصد محاولة تعدد حسابات على نفس الجهاز أو الشبكة (بصمة الروتر).</p>
            <p id="ban-note" style="color: gray; font-size: 13px;"></p>
            <p>بإدارة علي السيد - نظام الحماية المتقدم</p>
        </div>
    </div>

    <div id="userBar"><span>جاري فحص الأمان...</span></div>

    <header>
        <h1>متاهة السطور</h1>
        <p>المنصة العالمية بإدارة علي السيد</p>
    </header>

    <div class="library-grid" id="library"></div>

    <button class="publish-fixed" id="publishBtn">نشر عمل جديد +</button>

    <div id="auth-modal" class="modal">
        <div class="form-container">
            <h2 id="auth-title">إنشاء حساب كاتب</h2>
            <div id="reg-fields">
                <input type="text" id="r-fullname" placeholder="الاسم الثلاثي بالكامل">
                <input type="text" id="r-username" placeholder="اسم المستخدم">
                <input type="email" id="r-email" placeholder="البريد الإلكتروني">
                <input type="password" id="r-pass" placeholder="كلمة المرور">
                <input type="date" id="r-birth">
            </div>
            <div id="log-fields" style="display:none;">
                <input type="email" id="l-email" placeholder="البريد الإلكتروني">
                <input type="password" id="l-pass" placeholder="كلمة المرور">
            </div>
            <button class="btn-action" id="main-auth-btn">تأكيد العملية</button>
            <p id="toggle-auth" style="text-align:center; cursor:pointer; color:blue;">لديك حساب؟ سجل دخول</p>
            <p onclick="closeModal('auth-modal')" style="text-align:center; color:red; cursor:pointer;">إلغاء</p>
        </div>
    </div>

    <div id="publish-modal" class="modal">
        <div class="form-container">
            <h2>نشر عمل جديد</h2>
            <input type="text" id="p-title" placeholder="عنوان الكتاب">
            <textarea id="p-content" placeholder="المحتوى..." rows="10"></textarea>
            <button class="btn-action" id="submit-story-btn">إرسال للمراجعة</button>
            <p onclick="closeModal('publish-modal')" style="text-align:center; cursor:pointer;">إغلاق</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, addDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-H8jOCQeo-yWvICoiAR3LDJ2__mOd3MU",
            authDomain: "net2-a94c0.firebaseapp.com",
            projectId: "net2-a94c0",
            storageBucket: "net2-a94c0.firebasestorage.app",
            messagingSenderId: "242617859567",
            appId: "1:242617859567:web:795f4bb08f8746d1844a1a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserData = null;
        let isLogin = false;

        // دالة جلب البصمات (جهاز + روتر)
        const getIdentity = async () => {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            let dId = localStorage.getItem('maze_fingerprint');
            if(!dId) {
                dId = 'maze_' + Math.random().toString(36).substr(2, 9) + Date.now();
                localStorage.setItem('maze_fingerprint', dId);
            }
            return { ip: data.ip, device: dId };
        };

        // دالة الحظر الفوري وإرسال الأسباب لقاعدة البيانات
        const executeBan = async (uid, reason) => {
            await updateDoc(doc(db, "users", uid), { 
                status: "banned", 
                blocked: true, 
                banNote: reason,
                bannedAt: serverTimestamp() 
            });
            document.getElementById('ban-note').innerText = "سبب الحظر: " + reason;
            document.getElementById('ban-screen').style.display = 'flex';
        };

        // مراقبة حالة المستخدم
        onAuthStateChanged(auth, async (user) => {
            const bar = document.getElementById('userBar');
            if (user) {
                const s = await getDoc(doc(db, "users", user.uid));
                currentUserData = s.data();
                if(!currentUserData || currentUserData.blocked) {
                    document.getElementById('ban-screen').style.display = 'flex';
                    signOut(auth);
                    return;
                }
                bar.innerHTML = `<span>الكاتب: ${currentUserData.fullName}</span> <button id="logoutBtn" onclick="signOut(auth).then(()=>location.reload())">خروج</button>`;
            } else {
                bar.innerHTML = `<span>زائر</span> <button onclick="openModal('auth-modal')" style="background:var(--success); color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">دخول / تسجيل</button>`;
            }
        });

        // زر التأكيد (دخول أو تسجيل) مع نظام الفحص الأمني المتقدم
        document.getElementById('main-auth-btn').onclick = async () => {
            const iden = await getIdentity();
            
            // 1. فحص البصمات مسبقاً في قاعدة البيانات
            const qDev = query(collection(db, "users"), where("deviceId", "==", iden.device));
            const qIP = query(collection(db, "users"), where("ip", "==", iden.ip));
            const [snapDev, snapIP] = await Promise.all([getDocs(qDev), getDocs(qIP)]);

            let linkedUsers = [];
            snapDev.forEach(d => linkedUsers.push({id: d.id, ...d.data()}));
            snapIP.forEach(d => { if(!linkedUsers.find(x => x.id === d.id)) linkedUsers.push({id: d.id, ...d.data()}); });

            if(isLogin) {
                const email = document.getElementById('l-email').value;
                const pass = document.getElementById('l-pass').value;
                try {
                    const cred = await signInWithEmailAndPassword(auth, email, pass);
                    
                    // فحص: هل هذا الحساب مختلف عن الحسابات المرتبطة بهذه البصمة؟
                    const isNewAccountOnOldDevice = linkedUsers.length > 0 && !linkedUsers.find(u => u.id === cred.user.uid);
                    
                    if(isNewAccountOnOldDevice) {
                        const reason = "محاولة فتح حساب جديد/مختلف على نفس بصمة الجهاز أو الروتر المسجلة مسبقاً.";
                        // حظر الحساب الحالي
                        await executeBan(cred.user.uid, reason);
                        // حظر كل الحسابات القديمة المرتبطة بنفس البصمة
                        linkedUsers.forEach(u => executeBan(u.id, "مرتبط بجهاز/روتر تم حظره بسبب تعدد الحسابات."));
                        return;
                    }
                    location.reload();
                } catch(e) { alert("خطأ في بيانات الدخول"); }
            } else {
                // حالة إنشاء حساب جديد
                if(linkedUsers.length > 0) {
                    const reason = "محاولة إنشاء حساب جديد من جهاز أو روتر مسجل به حساب آخر بالفعل.";
                    // حظر الحسابات القديمة المرتبطة فوراً
                    linkedUsers.forEach(u => executeBan(u.id, reason));
                    document.getElementById('ban-screen').style.display = 'flex';
                    alert("⚠️ تم حظر هذا الجهاز والشبكة لمخالفة القوانين.");
                    return;
                }

                const name = document.getElementById('r-fullname').value;
                const user = document.getElementById('r-username').value;
                const email = document.getElementById('r-email').value;
                const pass = document.getElementById('r-pass').value;
                const birth = document.getElementById('r-birth').value;

                try {
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", cred.user.uid), {
                        fullName: name, username: user, email, birthDate: birth,
                        deviceId: iden.device, ip: iden.ip, status: "pending", blocked: false, createdAt: serverTimestamp()
                    });
                    alert("تم التسجيل! الحساب تحت المراجعة.");
                    location.reload();
                } catch(e) { alert(e.message); }
            }
        };

        // إرسال القصص
        document.getElementById('submit-story-btn').onclick = async () => {
            const title = document.getElementById('p-title').value;
            const content = document.getElementById('p-content').value;
            if(!title || !content) return alert("أكمل البيانات");
            await addDoc(collection(db, "stories"), {
                title, content, author: currentUserData.fullName, status: "pending"
            });
            alert("تم الإرسال للمراجعة");
            closeModal('publish-modal');
        };

        window.openModal = (id) => document.getElementById(id).style.display = 'block';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        document.getElementById('toggle-auth').onclick = () => {
            isLogin = !isLogin;
            document.getElementById('log-fields').style.display = isLogin ? 'block' : 'none';
            document.getElementById('reg-fields').style.display = isLogin ? 'none' : 'block';
            document.getElementById('auth-title').innerText = isLogin ? 'تسجيل دخول' : 'إنشاء حساب كاتب';
        };

        // تحميل المكتبة (للأعمال المقبولة فقط)
        (async function loadLibrary() {
            const q = query(collection(db, "stories"), where("status", "==", "approved"));
            const snap = await getDocs(q);
            const grid = document.getElementById('library');
            snap.forEach(d => {
                grid.innerHTML += `<div class="book-card"><h3>${d.data().title}</h3><span>${d.data().author}</span></div>`;
            });
        })();

        document.getElementById('publishBtn').onclick = () => {
            if(!currentUserData) return openModal('auth-modal');
            if(currentUserData.status === 'active') openModal('publish-modal');
            else alert("حسابك لا يزال قيد المراجعة.");
        };
    </script>
</body>
</html>
